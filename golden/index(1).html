<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Beauty - Connexion & Inscription</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff;
    }
    .navbar {
      background-color: #000;
    }
    .navbar-brand, .nav-link {
      color: white !important;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://static.vecteezy.com/system/resources/previews/002/288/036/large_2x/cosmetics-flat-lay-on-a-white-background-photo.jpg') no-repeat center center;
      background-size: cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 2px 2px 4px #000;
      margin-bottom: 40px;
    }
    .card {
      max-width: 400px;
      margin: 20px auto;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .link-btn {
      background: none;
      border: none;
      color: #0d6efd;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Golden Beauty</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Accueil</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Makeup Parfum</h1>
  </div>

  <!-- Connexion Card -->
  <div class="card" id="loginCard">
    <h2 class="text-center mb-4">Connexion Golden Beauty </h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="nom" class="form-label">Nom</label>
        <input type="text" class="form-control" id="nom" required>
      </div>
      <div class="mb-3">
        <label for="prenom" class="form-label">Prénom</label>
        <input type="text" class="form-control" id="prenom" required>
      </div>
      <div class="mb-3">
        <label for="motdepasse" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="motdepasse" required>
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-dark">Se connecter</button>
      </div>
      <div class="text-center">
        <button type="button" class="link-btn" onclick="afficherInscription()">Créer un compte</button>
      </div>
    </form>
    <p id="message" class="text-center mt-3"></p>
  </div>

  <!-- Inscription Card (cachée au début) -->
  <div class="card d-none" id="registerCard">
    <h2 class="text-center mb-4">Créer un compte</h2>
    <form id="registerForm">
      <div class="mb-3">
        <label for="registerNom" class="form-label">Nom</label>
        <input type="text" class="form-control" id="registerNom" required>
      </div>
      <div class="mb-3">
        <label for="registerPrenom" class="form-label">Prénom</label>
        <input type="text" class="form-control" id="registerPrenom" required>
      </div>
      <div class="mb-3">
        <label for="registerMotdepasse" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="registerMotdepasse" required>
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-dark">Créer mon compte</button>
      </div>
      <div class="text-center">
        <button type="button" class="link-btn" onclick="afficherConnexion()">Retour à la connexion</button>
      </div>
    </form>
    <p id="registerMessage" class="text-center mt-3"></p>
  </div>

  <!-- Scripts -->
  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const message = document.getElementById('message');
    const registerMessage = document.getElementById('registerMessage');
    const loginCard = document.getElementById('loginCard');
    const registerCard = document.getElementById('registerCard');

    function afficherInscription() {
      loginCard.classList.add('d-none');
      registerCard.classList.remove('d-none');
    }

    function afficherConnexion() {
      registerCard.classList.add('d-none');
      loginCard.classList.remove('d-none');
    }

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const nom = document.getElementById('nom').value;
      const prenom = document.getElementById('prenom').value;
      const motdepasse = document.getElementById('motdepasse').value;

      const utilisateurEnregistre = JSON.parse(localStorage.getItem('utilisateur'));

      if (utilisateurEnregistre && 
          utilisateurEnregistre.nom === nom &&
          utilisateurEnregistre.prenom === prenom &&
          utilisateurEnregistre.motdepasse === motdepasse) {

        message.innerHTML = "<span class='text-success'>Connexion réussie ! Bienvenue chez Beauté Luxe 🌟</span>";
        setTimeout(() => {
          window.location.href = "parfums.html"; // rediriger après connexion réussie
        }, 1500);

      } else {
        message.innerHTML = "<span class='text-danger'>Informations incorrectes. Veuillez réessayer.</span>";
      }
    });

    registerForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const nom = document.getElementById('registerNom').value;
      const prenom = document.getElementById('registerPrenom').value;
      const motdepasse = document.getElementById('registerMotdepasse').value;

      const utilisateur = {
        nom: nom,
        prenom: prenom,
        motdepasse: motdepasse
      };

      localStorage.setItem('utilisateur', JSON.stringify(utilisateur));

      registerMessage.innerHTML = "<span class='text-success'>Compte créé avec succès ! Vous pouvez maintenant vous connecter 🎉</span>";

      setTimeout(() => {
        afficherConnexion();
      }, 2000);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
